{{- if .Values.ingressRoute.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "server-info.fullname" . }}
  labels:
    {{- include "server-info.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ .Values.ingressRoute.host }}`)
      kind: Rule
      services:
        - name: {{ include "server-info.fullname" . }}
          port: {{ .Values.service.port }}
      {{- if .Values.ingressRoute.middleware.enabled }}
      middlewares:
        - name: {{ include "server-info.fullname" . }}-security
      {{- end }}
  tls:
    secretName: {{ .Values.ingressRoute.tls.secretName }}
{{- if .Values.ingressRoute.middleware.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "server-info.fullname" . }}-security
  labels:
    {{- include "server-info.labels" . | nindent 4 }}
spec:
  headers:
    {{- toYaml .Values.ingressRoute.middleware.headers | nindent 4 }}
{{- end }}
{{- end }}
