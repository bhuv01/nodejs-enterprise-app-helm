# Default values for server-info.
# These mirror the previous kustomize base + production overlay so the rendered
# output is equivalent to `kustomize build k8s/overlays/production`.

# -- Number of replicas. Ignored when autoscaling.enabled=true (HPA owns it).
replicaCount: 3
image:
  # Full ECR repository. ArgoCD Image Updater writes back to image.repository / image.tag.
  repository: 797416043431.dkr.ecr.ap-south-1.amazonaws.com/server-info
  # latest is a placeholder; CI / Image Updater pins this to the immutable SHA/digest tag.
  tag: sha-034b69661f56
  pullPolicy: IfNotPresent
# Override the generated names if you ever need to.
nameOverride: ""
fullnameOverride: "server-info"
# Scheduling priority — was added by the production overlay patch.
priorityClassName: ""
revisionHistoryLimit: 5
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
serviceAccount:
  create: true
  name: server-info
  automountServiceAccountToken: false
# Pod-level annotations. Prometheus scrape config lives here.
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  privileged: false
  capabilities:
    drop:
      - ALL
# Application listen port inside the container.
containerPort: 8080
# Extra environment variables (in addition to the downward-API vars the template injects).
env:
  - name: NODE_ENV
    value: "production"
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    path: /healthz
    periodSeconds: 2
    failureThreshold: 30
# Spread pods across nodes for HA.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    # labelSelector is injected by the template using the chart's selector labels.
service:
  type: ClusterIP
  port: 80
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
podDisruptionBudget:
  enabled: true
  minAvailable: 2
networkPolicy:
  enabled: true
  # Namespaces allowed to reach the app on the container port.
  ingressNamespaces:
    - traefik
    - monitoring
  # DNS-only egress by default (app has no other outbound dependency).
  allowDNS: true
ingressRoute:
  enabled: false
  entryPoints:
    - websecure
  host: server-info.mindsparks.io
  tls:
    secretName: server-info-tls
  # Traefik security-headers middleware.
  middleware:
    enabled: true
    headers:
      stsSeconds: 31536000
      stsIncludeSubdomains: true
      stsPreload: true
      forceSTSHeader: true
      contentTypeNosniff: true
      browserXssFilter: true
      referrerPolicy: "strict-origin-when-cross-origin"
      frameDeny: true
# Optional pod scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}
