services:
  server-info:
    build:
      context: .
      target: runtime
    image: server-info:local
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
