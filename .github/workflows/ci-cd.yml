name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default; jobs elevate only what they need.
permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: server-info
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------
  # 1. Secret scanning — fail fast before anything else runs.
  # ---------------------------------------------------------------
  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans all commits
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  # ---------------------------------------------------------------
  # 2. Lint, unit tests, coverage.
  # ---------------------------------------------------------------
  test:
    name: lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 5

  # ---------------------------------------------------------------
  # 3. Dependency / supply-chain checks.
  # ---------------------------------------------------------------
  dependencies:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: npm audit (high+)
        run: npm run audit:prod
      - name: Dependency review (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ---------------------------------------------------------------
  # 4. SAST + Quality Gate (SonarQube).
  #    Blocks the pipeline if the quality gate fails.
  # ---------------------------------------------------------------
  sonarqube:
    name: sonarqube + quality gate
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ---------------------------------------------------------------
  # 5. Build image, scan with Trivy, DAST with OWASP ZAP,
  #    then push to ECR — only if every gate above passed.
  # ---------------------------------------------------------------
  build-scan-push:
    name: build, scan & push
    runs-on: ubuntu-latest
    needs: [secret-scan, test, dependencies, sonarqube]
    permissions:
      contents: read
      id-token: write # OIDC: short-lived AWS creds, no stored keys
      security-events: write # upload Trivy SARIF to GitHub Security tab
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, not pushed yet)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: server-info:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- IaC / config scan ----
      - name: Trivy config scan (Dockerfile + K8s)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

      # ---- Image vulnerability scan (blocking) ----
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: server-info:${{ steps.meta.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # ---- DAST: OWASP ZAP baseline against the running container ----
      - name: Run container for DAST
        run: |
          docker run -d --name dast -p 8080:8080 server-info:${{ steps.meta.outputs.tag }}
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8080/healthz && break || sleep 2
          done

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:8080
          rules_file_name: .zap/rules.tsv
          cmd_options: "-a"
          fail_action: true

      - name: Stop DAST container
        if: always()
        run: docker rm -f dast || true

      # ---- Only now authenticate to AWS and push ----
      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: github.ref == 'refs/heads/main'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag & push to ECR
        if: github.ref == 'refs/heads/main'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker tag server-info:$TAG $REGISTRY/$ECR_REPOSITORY:$TAG
          docker tag server-info:$TAG $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:$TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest

  # ---------------------------------------------------------------
  # 6. GitOps deploy — bump the image tag in the Helm values file.
  #    ArgoCD (auto-sync) reconciles the on-prem RKE2 cluster.
  #
  #    NOTE: ArgoCD Image Updater (configured on the Application with the
  #    digest strategy + git write-back) can do this for you instead. If you
  #    rely on Image Updater, delete this whole job to avoid two writers
  #    racing on git. Keeping it here preserves the original CI-driven flow.
  # ---------------------------------------------------------------
  deploy:
    name: gitops deploy (argocd)
    runs-on: ubuntu-latest
    needs: [build-scan-push]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo curl -sSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Bump image tag in Helm values
        run: |
          yq -i '.image.tag = "${{ needs.build-scan-push.outputs.image_tag }}"' \
            charts/server-info/values.yaml
      - name: Commit & push manifest change
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add charts/server-info/values.yaml
          git commit -m "deploy: server-info ${{ needs.build-scan-push.outputs.image_tag }} [skip ci]" || echo "no change"
          git push
